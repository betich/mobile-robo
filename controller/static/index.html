<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>mobile-robo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #eee;
    font-family: monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    touch-action: none;
    user-select: none;
  }

  #feed-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }
  #feed {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  #sticks {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 20px 40px 24px;
  }

  .stick-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .stick-outer {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 1px solid #2a2a2a;
    background: #161616;
    position: relative;
    cursor: pointer;
    touch-action: none;
  }

  /* crosshair */
  .stick-outer::before,
  .stick-outer::after {
    content: '';
    position: absolute;
    background: #222;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .stick-outer::before { width: 1px; height: 100%; }
  .stick-outer::after  { width: 100%; height: 1px; }

  .stick-knob {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #2c2c2c;
    border: 1px solid #444;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform;
    transition: background 0.08s, border-color 0.08s;
    z-index: 1;
  }

  .stick-outer.active .stick-knob {
    background: #0a84ff;
    border-color: #0a84ff;
  }

  .stick-label {
    font-size: 10px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  #status {
    text-align: center;
    font-size: 11px;
    color: #333;
    padding-bottom: 8px;
  }
  #status.ok  { color: #30d158; }
  #status.err { color: #ff453a; }
</style>
</head>
<body>

<div id="feed-wrap">
  <img id="feed" src="/stream" alt="camera feed">
</div>

<div id="sticks">
  <div class="stick-wrap">
    <div class="stick-outer" id="stick-L">
      <div class="stick-knob" id="knob-L"></div>
    </div>
    <span class="stick-label">drive</span>
  </div>
  <div class="stick-wrap">
    <div class="stick-outer" id="stick-R">
      <div class="stick-knob" id="knob-R"></div>
    </div>
    <span class="stick-label">servo</span>
  </div>
</div>

<div id="status">connecting…</div>

<script>
const MAX_DRIVE = 0.3;   // m/s
const MAX_SERVO = 45.0;  // deg/s
const SEND_HZ   = 20;

// ── WebSocket ──────────────────────────────────────────────────────────────

let ws = null;
const statusEl = document.getElementById('status');

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen  = () => { statusEl.textContent = 'connected'; statusEl.className = 'ok'; };
  ws.onclose = () => { statusEl.textContent = 'disconnected — retrying…'; statusEl.className = 'err'; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
}
connect();

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(msg);
}

// ── Joystick state ─────────────────────────────────────────────────────────

let driveNX = 0, driveNY = 0;
let servoNX = 0, servoNY = 0;

// ── Joystick builder ───────────────────────────────────────────────────────

function makeStick(outerEl, knobEl, onChange) {
  let activePtr = null;

  function move(cx, cy) {
    const rect = outerEl.getBoundingClientRect();
    const R    = rect.width / 2;
    const KR   = knobEl.offsetWidth / 2;
    const max  = R - KR;
    const dx   = cx - (rect.left + R);
    const dy   = cy - (rect.top  + R);
    const dist = Math.hypot(dx, dy);
    const c    = Math.min(dist, max);
    const a    = Math.atan2(dy, dx);
    const ox   = c * Math.cos(a);
    const oy   = c * Math.sin(a);
    // Offset knob from its natural center position
    knobEl.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
    onChange(ox / max, oy / max);
  }

  outerEl.addEventListener('pointerdown', e => {
    if (activePtr !== null) return;
    activePtr = e.pointerId;
    outerEl.setPointerCapture(e.pointerId);
    outerEl.classList.add('active');
    move(e.clientX, e.clientY);
  });

  outerEl.addEventListener('pointermove', e => {
    if (e.pointerId !== activePtr) return;
    move(e.clientX, e.clientY);
  });

  function release(e) {
    if (e.pointerId !== activePtr) return;
    activePtr = null;
    knobEl.style.transform = 'translate(-50%, -50%)';
    outerEl.classList.remove('active');
    onChange(0, 0);
  }

  outerEl.addEventListener('pointerup',     release);
  outerEl.addEventListener('pointercancel', release);
}

makeStick(
  document.getElementById('stick-L'),
  document.getElementById('knob-L'),
  (nx, ny) => { driveNX = nx; driveNY = ny; }
);
makeStick(
  document.getElementById('stick-R'),
  document.getElementById('knob-R'),
  (nx, ny) => { servoNX = nx; servoNY = ny; }
);

// ── Send loop ──────────────────────────────────────────────────────────────

setInterval(() => {
  // Left stick: up = forward (u+), right = strafe-right (v+ in OpenCR convention)
  const u  = (-driveNY * MAX_DRIVE).toFixed(2);
  const v  = ( driveNX * MAX_DRIVE).toFixed(2);
  // Right stick: right = pan+, up = tilt+
  const sx = ( servoNX * MAX_SERVO).toFixed(2);
  const sy = (-servoNY * MAX_SERVO).toFixed(2);

  send(`DRIVE ${u} ${v}`);
  send(`SERVO ${sx} ${sy}`);
}, 1000 / SEND_HZ);
</script>
</body>
</html>
